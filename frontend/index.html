<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Code Review Agent</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header>
        <h1 class="gradient-text">✨ Gemini Code Review</h1>
        <p>AI Code Analysis powered by Google Gemini 2.5</p>
    </header>

    <main class="dashboard">
        <section class="panel editor-panel glass">
            <div class="panel-header">
                <h2>Source Code</h2>
            </div>
            <textarea id="code-input" spellcheck="false" placeholder="def my_function():\n    # Paste your code here to be reviewed by Gemini 2.5..."></textarea>
            <button id="review-btn" class="glow-on-hover">Run Gemini Review</button>
        </section>

        <section class="panel results-panel glass">
            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p class="loader-text">Analyzing your code with <span class="gemini-highlight">Gemini 2.5 Flash</span>...</p>
            </div>
            
            <div id="results" class="hidden">
                <div class="score-container">
                    <div class="score-circle">
                        <span id="confidence-score">95</span><span style="font-size: 0.5em">%</span>
                    </div>
                    <h3>Confidence Score</h3>
                </div>

                <div class="issues-container">
                    <div class="issue-box bugs-box">
                        <h3>🐞 Bugs Detected</h3>
                        <ul id="bugs-list"></ul>
                    </div>
                    <div class="issue-box flaws-box">
                        <h3>🔐 Security Flaws</h3>
                        <ul id="flaws-list"></ul>
                    </div>
                </div>

                <div class="refactored-container">
                    <h3>💡 Refactored Code</h3>
                    <pre><code id="refactored-code"></code></pre>
                </div>
            </div>
            
            <div id="empty-state" class="empty-state">
                <p>Submit code on the left to see the Gemini analysis report.</p>
            </div>
        </section>
    </main>

    <script src="/frontend/script.js"></script>
</body>
</html>
